<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayPal Checkout Demo</title>
</head>

<body>
  <h1>PayPal Checkout Demo</h1>
  <p>Demo product &mdash; <strong>£9.99 GBP</strong></p>

  <div id="paypal-button-container">
    <paypal-button hidden></paypal-button>
  </div>

  <pre id="result"></pre>

  <script type="module" defer>
    async function createOrder() {
      const response = await fetch("/api/orders", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ itemId: "demo-product" }),
      });
      const data = await response.json();
      return { orderId: data.id };
    }

    async function onApprove(data) {
      const response = await fetch(`/api/orders/${data.orderId}/capture`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
      });
      const responseData = await response.json();

      if (responseData.status === "COMPLETED") {
        document.getElementById("result").textContent =
          "Payment completed successfully!";
      } else {
        document.getElementById("result").textContent =
          `Payment status: ${responseData.status}`;
      }
    }

    const response = await fetch("/api/config");
    const { clientId, sdkUrl } = await response.json();

    await new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = sdkUrl;
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });

    const sdk = await window.paypal.createInstance({
      clientId,
      components: ["paypal-payments"],
      pageType: "checkout",
    });

    const paypalButton = document.querySelector("paypal-button");
    paypalButton.removeAttribute("hidden");

    paypalButton.addEventListener("click", async () => {
      const session = sdk.createPayPalOneTimePaymentSession({
        onApprove,
      });

      await session.start(
        { presentationMode: "auto" },
        createOrder,
      );
    });
  </script>
</body>

</html>
